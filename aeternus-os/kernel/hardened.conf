# AETERNUS OS — Configuração linux-hardened
# Arquivo: /etc/modprobe.d/aeternus-hardened.conf + /etc/sysctl.d/99-aeternus.conf
#
# INSTALAÇÃO:
#   sudo cp hardened.conf /etc/modprobe.d/aeternus-blacklist.conf
#   sudo cp hardened-sysctl.conf /etc/sysctl.d/99-aeternus.conf
#   sudo sysctl --system
#   sudo mkinitcpio -P   # após instalar linux-hardened
#
# MUDAR KERNEL:
#   sudo pacman -S linux-hardened linux-hardened-headers
#   sudo grub-mkconfig -o /boot/grub/grub.cfg

# ── Módulos do kernel desativados (superfície de ataque) ──────────────────────

# Sistemas de arquivo raramente usados — exploits históricos
install cramfs   /bin/false
install freevxfs /bin/false
install jffs2    /bin/false
install hfs      /bin/false
install hfsplus  /bin/false
install squashfs /bin/false
install udf      /bin/false
install vfat     /bin/false   # Remova se precisar de FAT/USB

# Protocolos de rede desnecessários
install dccp  /bin/false
install sctp  /bin/false
install rds   /bin/false
install tipc  /bin/false
install n-hdlc /bin/false
install ax25  /bin/false
install netrom /bin/false
install x25   /bin/false
install rose  /bin/false
install decnet /bin/false
install econet /bin/false
install af_802154 /bin/false
install ipx   /bin/false
install appletalk /bin/false
install psnap /bin/false
install p8023 /bin/false
install llc   /bin/false
install p8022 /bin/false
install atm   /bin/false

# Hardware / Exploits físicos
install firewire-core /bin/false  # DMA attacks via FireWire
install thunderbolt   /bin/false  # DMA attacks via Thunderbolt (remova se usar)
install usb_storage   /bin/false  # BadUSB — remova se precisar de USB storage
install usbcore       /bin/false  # Mova para /etc/modprobe.d/usb.conf se precisar USB

# Bluetooth — vetor de ataque
install bluetooth   /bin/false
install btusb       /bin/false
install bnep        /bin/false
install bluetooth   /bin/false

# Câmera / Microfone — privacidade
install uvcvideo    /bin/false
install snd_usb_audio /bin/false  # Remova se usar microfone USB

# Outros vetores
install vivid       /bin/false
install kvm         /bin/false   # Remova se usar VMs
install kvm_intel   /bin/false
install kvm_amd     /bin/false

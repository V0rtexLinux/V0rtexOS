# AETERNUS OS — Parâmetros sysctl para linux-hardened
# Caminho: /etc/sysctl.d/99-aeternus.conf
# Aplique com: sudo sysctl --system

# ─────────────────────────────────────────────────
# KERNEL — Proteção contra exploits e vazamento de info
# ─────────────────────────────────────────────────

# Randomização do espaço de endereços (ASLR máximo)
kernel.randomize_va_space = 2

# Ocultar ponteiros de kernel em /proc e logs
kernel.kptr_restrict = 2

# Restringir acesso a dmesg
kernel.dmesg_restrict = 1

# Desabilitar SysRq em produção (vetor de ataque físico)
kernel.sysrq = 0

# ptrace restrito — impede que processos não-root depurem outros
# 0=default, 1=apenas pai, 2=apenas root, 3=desativado
kernel.yama.ptrace_scope = 2

# Perf events — restrito a root
kernel.perf_event_paranoid = 3
kernel.perf_event_max_sample_rate = 1
kernel.perf_cpu_time_max_percent = 1

# Desabilitar core dumps (evita vazamento de dados em crash)
fs.suid_dumpable = 0
kernel.core_pattern = |/bin/false

# Endereço mínimo de mmap (mitiga NULL ptr dereference)
vm.mmap_min_addr = 65536

# ─────────────────────────────────────────────────
# MEMÓRIA — Anti-exploit
# ─────────────────────────────────────────────────

# Limitar mmap — reduz superfície de spray
vm.mmap_rnd_bits = 32
vm.mmap_rnd_compat_bits = 16

# Panic em corrupção de memória detectada
vm.panic_on_oom = 0
kernel.panic_on_oops = 1
kernel.oops_limit = 1

# ─────────────────────────────────────────────────
# FILESYSTEM — Proteções
# ─────────────────────────────────────────────────

# Prevenir seguir hardlinks de outros usuários
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# Proteger FIFOs e arquivos regulares em diretórios world-writable
fs.protected_fifos = 2
fs.protected_regular = 2

# ─────────────────────────────────────────────────
# REDE — Anti-leak, Anti-spoofing, Anti-MITM
# ─────────────────────────────────────────────────

# Desabilitar IPv6 completamente (anti-leak)
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# Reverse path filtering — anti-spoofing
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Não aceitar ICMP redirects — anti-MITM
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Não enviar redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Não aceitar source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# SYN cookies — anti-SYN flood
net.ipv4.tcp_syncookies = 1

# Ignorar broadcasts ICMP — anti-Smurf
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Desabilitar TCP timestamps — ocultar uptime
net.ipv4.tcp_timestamps = 0

# BBR + fq para throughput pela VPN (opcional, requer linux >= 4.9)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Log de pacotes martians (debug)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Não rotear pacotes (não somos um roteador)
net.ipv4.ip_forward = 0

# ─────────────────────────────────────────────────
# BPF — Restringir JIT (anti-info-leak)
# ─────────────────────────────────────────────────
net.core.bpf_jit_harden = 2

# ─────────────────────────────────────────────────
# KERNEL BUG — Panic em condições críticas
# ─────────────────────────────────────────────────
kernel.panic = 10
kernel.panic_on_warn = 1

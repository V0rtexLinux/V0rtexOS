# AETERNUS OS — mkinitcpio.conf para linux-hardened
# Caminho: /etc/mkinitcpio.conf
# Aplique com: sudo mkinitcpio -p linux-hardened

# Módulos a incluir na initramfs (apenas o necessário)
MODULES=(ext4 dm_crypt dm_mod aes_x86_64 crypto_simd cryptd sha256)

# Binários adicionais na initramfs
BINARIES=()

# Arquivos adicionais
FILES=()

# HOOKS — Ordem importante!
# encrypt deve vir antes de filesystems se usar LUKS
HOOKS=(base udev autodetect microcode modconf keyboard keymap consolefont encrypt lvm2 block filesystems fsck)

# Compressão da initramfs
COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-9)

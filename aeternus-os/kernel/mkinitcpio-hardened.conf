# V0rtexOS — mkinitcpio.conf para linux-hardened
# Caminho: /etc/mkinitcpio.conf
# Aplique com: sudo mkinitcpio -p linux-hardened

# squashfs e loop são obrigatórios para o archiso montar o airootfs
MODULES=(loop squashfs overlay ext4 dm_crypt dm_mod cryptd)

BINARIES=()

FILES=()

# HOOKS — Ordem importante!
# archiso_loop_mnt precisa de loop+squashfs já carregados (via MODULES acima)
HOOKS=(base udev microcode modconf kms memdisk archiso archiso_loop_mnt block filesystems keyboard)

COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-3)

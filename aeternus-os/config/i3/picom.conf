# ══════════════════════════════════════════════════════
#  V0rtexOS — Picom Compositor
# ══════════════════════════════════════════════════════

backend          = "xrender";
use-damage       = true;
vsync            = true;

# ── Shadows ───────────────────────────────────────────
shadow          = true;
shadow-radius   = 14;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-opacity  = 0.55;
shadow-color    = "#000000";

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'i3-frame'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Fading ────────────────────────────────────────────
fading         = true;
fade-in-step   = 0.04;
fade-out-step  = 0.04;
fade-delta     = 4;
fade-exclude   = [];

# ── Opacity ───────────────────────────────────────────
active-opacity            = 1.0;
inactive-opacity          = 0.92;
frame-opacity             = 0.8;
inactive-opacity-override = false;

opacity-rule = [
    "95:class_g = 'Alacritty'",
    "88:class_g = 'Alacritty' && !focused",
    "100:class_g = 'firefox'",
    "100:class_g = 'Wireshark'"
];

# ── Rounded corners ───────────────────────────────────
corner-radius = 6;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'"
];

# ── Performance ───────────────────────────────────────
mark-wmwin-focused       = true;
mark-ovredir-focused     = true;
detect-rounded-corners   = true;
detect-client-opacity    = true;
refresh-rate             = 0;
detect-transient         = true;
detect-client-leader     = true;
use-ewmh-active-win      = true;

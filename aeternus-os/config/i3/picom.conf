# AETERNUS OS — Picom Compositor
# Caminho: ~/.config/picom/picom.conf
# Proporciona blur e transparência para o Alacritty

# ─────────────────────────────────────────────────
# BACKEND
# ─────────────────────────────────────────────────
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true;

# ─────────────────────────────────────────────────
# SOMBRAS
# ─────────────────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.6;
shadow-color = "#000000";

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'i3-frame'"
];

# ─────────────────────────────────────────────────
# FADE (transições suaves)
# ─────────────────────────────────────────────────
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

fade-exclude = [];

# ─────────────────────────────────────────────────
# TRANSPARÊNCIA / OPACIDADE
# ─────────────────────────────────────────────────
active-opacity = 1.0;
inactive-opacity = 0.90;
frame-opacity = 0.7;
inactive-opacity-override = false;

opacity-rule = [
    "95:class_g = 'Alacritty'",
    "90:class_g = 'Alacritty' && !focused",
    "100:class_g = 'firefox'",
    "100:class_g = 'Wireshark'",
];

# ─────────────────────────────────────────────────
# BLUR — Fundo do Alacritty
# ─────────────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 8;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ─────────────────────────────────────────────────
# ROUNDED CORNERS
# ─────────────────────────────────────────────────
corner-radius = 8;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'"
];

# ─────────────────────────────────────────────────
# PERFORMANCE
# ─────────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
detect-transient = true;
detect-client-leader = true;
use-ewmh-active-win = true;

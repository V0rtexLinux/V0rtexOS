# AETERNUS OS — i3status configuration
# Caminho: ~/.config/i3/i3status.conf

general {
    colors = true
    color_good     = "#00ff41"
    color_degraded = "#ffaa00"
    color_bad      = "#ff0040"
    interval = 5
    output_format = "i3bar"
}

order += "ipv6"
order += "disk /"
order += "load"
order += "memory"
order += "cpu_temperature 0"
order += "ethernet _first_"
order += "tztime local"

# VPN/Tor status via tun0
ethernet tun0 {
    format_up   = "VPN: %ip"
    format_down = "VPN: DOWN ⚠"
}

ethernet _first_ {
    format_up   = "ETH: %ip"
    format_down = "ETH: down"
}

ipv6 {
    format_up   = ""
    format_down = "IPv6: off ✓"
}

disk "/" {
    format = "DISK: %avail"
}

load {
    format = "LOAD: %1min"
}

memory {
    format = "RAM: %used / %total"
    threshold_degraded = "10%"
    format_degraded = "RAM: LOW %free"
}

cpu_temperature 0 {
    format = "TEMP: %degrees°C"
    path   = "/sys/class/thermal/thermal_zone0/temp"
}

tztime local {
    format = "%Y-%m-%d %H:%M:%S"
}

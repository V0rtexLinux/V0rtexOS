# ══════════════════════════════════════════════════════
#  V0rtexOS — i3status Bar
#  Theme: Black / Gray / White
# ══════════════════════════════════════════════════════

general {
    colors       = true
    color_good   = "#aaaaaa"
    color_degraded = "#888888"
    color_bad    = "#cc2233"
    interval     = 5
    output_format = "i3bar"
}

order += "disk /"
order += "memory"
order += "load"
order += "cpu_temperature 0"
order += "ethernet _first_"
order += "tztime local"

disk "/" {
    format = "  %avail"
}

memory {
    format           = "  %used / %total"
    threshold_degraded = "10%"
    format_degraded  = "  LOW %free"
}

load {
    format = "  %1min"
}

cpu_temperature 0 {
    format = "  %degrees°C"
    path   = "/sys/class/thermal/thermal_zone0/temp"
}

ethernet _first_ {
    format_up   = "  %ip"
    format_down = "  offline"
}

tztime local {
    format = "  %Y-%m-%d  %H:%M"
}

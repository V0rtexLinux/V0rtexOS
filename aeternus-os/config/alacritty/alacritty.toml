# ══════════════════════════════════════════════════════
#  AETERNUS OS — Alacritty Terminal
#  Theme: Black / Gray / White | JetBrainsMono Nerd Font
# ══════════════════════════════════════════════════════

[window]
dimensions       = { columns = 120, lines = 36 }
padding          = { x = 10, y = 8 }
decorations      = "None"
opacity          = 0.93
blur             = true
startup_mode     = "Windowed"
title            = "AETERNUS"
dynamic_title    = true
class            = { instance = "alacritty", general = "alacritty" }

[scrolling]
history    = 50000
multiplier = 5

# ── Font (monospace stays JetBrains for readability) ──
[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style  = "Bold Italic"

[font.offset]
x = 0
y = 1

# ── Colors: Black / Gray / White ──────────────────────
[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background        = "#000000"
foreground        = "#e0e0e0"
dim_foreground    = "#888888"
bright_foreground = "#ffffff"

[colors.cursor]
text   = "#000000"
cursor = "#aaaaaa"

[colors.vi_mode_cursor]
text   = "#000000"
cursor = "#ffffff"

[colors.selection]
text       = "#000000"
background = "#888888"

[colors.search.matches]
foreground = "#000000"
background = "#888888"

[colors.search.focused_match]
foreground = "#000000"
background = "#ffffff"

[colors.normal]
black   = "#000000"
red     = "#cc2233"
green   = "#aaaaaa"
yellow  = "#cccccc"
blue    = "#888888"
magenta = "#999999"
cyan    = "#bbbbbb"
white   = "#e0e0e0"

[colors.bright]
black   = "#333333"
red     = "#dd3344"
green   = "#cccccc"
yellow  = "#ffffff"
blue    = "#aaaaaa"
magenta = "#bbbbbb"
cyan    = "#dddddd"
white   = "#ffffff"

[colors.dim]
black   = "#0d0d0d"
red     = "#881122"
green   = "#555555"
yellow  = "#777777"
blue    = "#444444"
magenta = "#555555"
cyan    = "#666666"
white   = "#888888"

# ── Cursor ────────────────────────────────────────────
[cursor]
style             = { shape = "Block", blinking = "On" }
vi_mode_style     = { shape = "Underline", blinking = "On" }
blink_interval    = 500
blink_timeout     = 0
unfocused_hollow  = true
thickness         = 0.15

[terminal]
osc52 = "CopyPaste"

[mouse]
hide_when_typing = true
bindings = [
    { mouse = "Middle", action = "PasteSelection" }
]

[keyboard]
bindings = [
    { key = "C",        mods = "Control|Shift", action = "Copy" },
    { key = "V",        mods = "Control|Shift", action = "Paste" },
    { key = "Insert",   mods = "Shift",          action = "PasteSelection" },
    { key = "PageUp",   mods = "Shift",  action = "ScrollPageUp" },
    { key = "PageDown", mods = "Shift",  action = "ScrollPageDown" },
    { key = "Home",     mods = "Shift",  action = "ScrollToTop" },
    { key = "End",      mods = "Shift",  action = "ScrollToBottom" },
    { key = "Plus",     mods = "Control", action = "IncreaseFontSize" },
    { key = "Minus",    mods = "Control", action = "DecreaseFontSize" },
    { key = "Key0",     mods = "Control", action = "ResetFontSize" },
    { key = "F",        mods = "Control|Shift", action = "SearchForward" },
    { key = "B",        mods = "Control|Shift", action = "SearchBackward" },
    { key = "Space",    mods = "Control|Shift", action = "ToggleViMode" },
    { key = "Return",   mods = "Control|Shift",
      command = { program = "i3-msg", args = ["exec", "alacritty"] } },
]

[debug]
render_timer       = false
persistent_logging = false
log_level          = "Warn"
print_events       = false

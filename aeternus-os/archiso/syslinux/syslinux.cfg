DEFAULT v0rtex
TIMEOUT 5
PROMPT 0

LABEL v0rtex
    MENU LABEL V0rtexOS
    LINUX /arch/boot/x86_64/vmlinuz-linux-hardened
    INITRD /arch/boot/x86_64/initramfs-linux-hardened.img
    APPEND archisobasedir=arch archisolabel=V0RTEX_OS cow_spacesize=4G quiet loglevel=0 rd.udev.log_level=3 apparmor=1 security=apparmor page_poison=1 slab_nomerge pti=on vsyscall=none spectre_v2=on spec_store_bypass_disable=on mitigations=auto,nosmt systemd.show_status=0 vt.handoff=7 console=tty0

LABEL fast
    MENU LABEL V0rtexOS (VM/Fast Boot)
    LINUX /arch/boot/x86_64/vmlinuz-linux-hardened
    INITRD /arch/boot/x86_64/initramfs-linux-hardened.img
    APPEND archisobasedir=arch archisolabel=V0RTEX_OS cow_spacesize=4G quiet loglevel=0 apparmor=1 security=apparmor mitigations=off systemd.show_status=0 vt.handoff=7 console=tty0

LABEL safe
    MENU LABEL V0rtexOS (Safe/VESA — sem KMS)
    LINUX /arch/boot/x86_64/vmlinuz-linux-hardened
    INITRD /arch/boot/x86_64/initramfs-linux-hardened.img
    APPEND archisobasedir=arch archisolabel=V0RTEX_OS cow_spacesize=4G nomodeset quiet loglevel=0 apparmor=1 security=apparmor mitigations=off systemd.show_status=0 vt.handoff=7 console=tty0

LABEL debug
    MENU LABEL V0rtexOS (Debug/Verbose)
    LINUX /arch/boot/x86_64/vmlinuz-linux-hardened
    INITRD /arch/boot/x86_64/initramfs-linux-hardened.img
    APPEND archisobasedir=arch archisolabel=V0RTEX_OS cow_spacesize=4G loglevel=7 apparmor=1 security=apparmor console=tty0

LABEL reboot
    MENU LABEL Reboot
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL Power Off
    COM32 poweroff.c32

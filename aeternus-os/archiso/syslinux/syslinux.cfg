DEFAULT aeternus
TIMEOUT 50
PROMPT 0

LABEL aeternus
    MENU LABEL AETERNUS OS
    LINUX /arch/boot/x86_64/vmlinuz-linux-hardened
    INITRD /arch/boot/x86_64/initramfs-linux-hardened.img
    APPEND archisobasedir=arch archisolabel=AETERNUS_OS quiet loglevel=0 apparmor=1 security=apparmor page_poison=1 slab_nomerge pti=on vsyscall=none spectre_v2=on spec_store_bypass_disable=on mitigations=auto,nosmt rd.systemd.show_status=auto

LABEL debug
    MENU LABEL AETERNUS OS (Debug/Verbose)
    LINUX /arch/boot/x86_64/vmlinuz-linux-hardened
    INITRD /arch/boot/x86_64/initramfs-linux-hardened.img
    APPEND archisobasedir=arch archisolabel=AETERNUS_OS apparmor=1 security=apparmor

LABEL reboot
    MENU LABEL Reboot
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL Power Off
    COM32 poweroff.c32

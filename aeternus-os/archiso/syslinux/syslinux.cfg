DEFAULT v0rtex
TIMEOUT 50
PROMPT 0

LABEL v0rtex
    MENU LABEL V0rtexOS
    LINUX /arch/boot/x86_64/vmlinuz-linux-hardened
    INITRD /arch/boot/x86_64/initramfs-linux-hardened.img
    APPEND archisobasedir=arch archisolabel=V0RTEX_OS quiet splash loglevel=0 apparmor=1 security=apparmor page_poison=1 slab_nomerge pti=on vsyscall=none spectre_v2=on spec_store_bypass_disable=on mitigations=auto,nosmt rd.systemd.show_status=auto plymouth.enable=1

LABEL debug
    MENU LABEL V0rtexOS (Debug/Verbose)
    LINUX /arch/boot/x86_64/vmlinuz-linux-hardened
    INITRD /arch/boot/x86_64/initramfs-linux-hardened.img
    APPEND archisobasedir=arch archisolabel=V0RTEX_OS apparmor=1 security=apparmor

LABEL reboot
    MENU LABEL Reboot
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL Power Off
    COM32 poweroff.c32

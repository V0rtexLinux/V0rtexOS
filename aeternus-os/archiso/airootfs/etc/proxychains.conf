# V0rtexOS — Proxychains4 Configuration
# Encadeia: SOCKS5 (Tor 9050) → para todas as ferramentas

# Modo: strict_chain = todos os proxies em sequência (falha se um cair)
# dynamic_chain = pula proxies inativos
strict_chain

proxy_dns
remote_dns_subnet 224
tcp_read_time_out 15000
tcp_connect_time_out 8000

# Não proxificar localhost e redes locais
localnet 127.0.0.0/255.0.0.0
localnet ::1/128

[ProxyList]
# Tor (SOCKS5)
socks5 127.0.0.1 9050

# Adicione VPNs ou proxies adicionais abaixo para encadeamento:
# socks5 10.8.0.1 1080
# http   proxy.exemplo.com 8080

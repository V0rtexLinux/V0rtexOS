# V0rtexOS — Xorg configuration
# Compatível com VMs (VectrasVM/QEMU, VMware, VirtualBox) e hardware real.
#
# Prioridade de driver: modesetting (DRM/KMS) → vesa → fbdev
# Com nomodeset no kernel: modesetting falha → vesa assume automaticamente.

Section "ServerFlags"
    Option "AutoAddDevices"    "true"
    Option "AutoEnableDevices" "true"
    Option "AllowEmptyInput"   "false"
    Option "DontVTSwitch"      "false"
EndSection

Section "InputClass"
    Identifier "libinput pointer catchall"
    MatchIsPointer "on"
    Driver "libinput"
    Option "AccelProfile" "flat"
EndSection

Section "InputClass"
    Identifier "libinput keyboard catchall"
    MatchIsKeyboard "on"
    Driver "libinput"
EndSection

# ── GPU Auto-detect ──────────────────────────────────────────────────────────
# Sem Driver explícito: Xorg tenta modesetting primeiro (DRM/KMS).
# Se o kernel foi iniciado com nomodeset (VM/Fast Boot entry), DRM/KMS está
# desativado e Xorg cai automaticamente para o próximo driver disponível:
# vesa (xf86-video-vesa) ou fbdev (xf86-video-fbdev).
Section "Device"
    Identifier  "GPU"
    Option      "AccelMethod"   "none"
    Option      "NoAccel"       "true"
EndSection

Section "Screen"
    Identifier "DefaultScreen"
    Device     "GPU"
    DefaultDepth 24
    SubSection "Display"
        Depth  24
        Modes  "1920x1080" "1600x900" "1280x800" "1280x720" "1024x768" "800x600"
    EndSubSection
EndSection

Section "Monitor"
    Identifier "DefaultMonitor"
    Option "DPMS" "false"
    Option "PreferredMode" "1280x720"
EndSection

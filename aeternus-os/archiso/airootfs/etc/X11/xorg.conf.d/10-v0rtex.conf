# V0rtexOS — Xorg configuration
# Garante que o servidor X inicializa em qualquer hardware ou VM.
# Driver order: modesetting (DRM/KMS) → vmware → fbdev → vesa

Section "ServerFlags"
    Option "AutoAddDevices"    "true"
    Option "AutoEnableDevices" "true"
    Option "AllowEmptyInput"   "false"
EndSection

Section "InputClass"
    Identifier "libinput pointer catchall"
    MatchIsPointer "on"
    Driver "libinput"
EndSection

Section "InputClass"
    Identifier "libinput keyboard catchall"
    MatchIsKeyboard "on"
    Driver "libinput"
EndSection

# Device sem driver explícito: Xorg tenta modesetting (DRM/KMS),
# depois vmware, fbdev e vesa automaticamente via AutoConfig.
Section "Device"
    Identifier  "Autodetect"
    # Driver não especificado — deixa o Xorg detectar o melhor disponível.
    # Para forçar um driver específico, descomente uma das linhas abaixo:
    #Driver "modesetting"
    #Driver "vmware"
    #Driver "fbdev"
    #Driver "vesa"
    Option "AccelMethod" "none"
EndSection

Section "Screen"
    Identifier "DefaultScreen"
    Device     "Autodetect"
    DefaultDepth 24
    SubSection "Display"
        Depth  24
        Modes  "1920x1080" "1600x900" "1280x720" "1024x768" "800x600"
    EndSubSection
EndSection

Section "Monitor"
    Identifier "DefaultMonitor"
    Option "DPMS" "false"
EndSection

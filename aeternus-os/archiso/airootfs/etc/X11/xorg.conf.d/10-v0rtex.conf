# V0rtexOS — Xorg configuration
# Compatível com VMs (VectrasVM/QEMU, VMware, VirtualBox) e bare metal.
#
# SEM Device/Screen explícito: Xorg usa auto-detect via PCI scanning.
# Drivers disponíveis (em ordem de preferência pelo Xorg):
#   modesetting  — usa DRM/KMS do kernel (padrão; funciona em QEMU bochs-drm,
#                  Intel, AMD, Nouveau, Virtio-GPU)
#   xf86-video-fbdev — usa /dev/fb0 (fallback para VMs sem DRM)
#   xf86-video-vesa  — usa VESA BIOS (último recurso)
#
# O Xorg seleciona automaticamente o melhor driver disponível para o hardware
# detectado. Não especificar Driver aqui é o comportamento correto.

Section "ServerFlags"
    Option "AutoAddDevices"    "true"
    Option "AutoEnableDevices" "true"
    Option "AllowEmptyInput"   "false"
EndSection

Section "InputClass"
    Identifier "libinput pointer"
    MatchIsPointer "on"
    Driver "libinput"
    Option "AccelProfile" "flat"
EndSection

Section "InputClass"
    Identifier "libinput keyboard"
    MatchIsKeyboard "on"
    Driver "libinput"
EndSection

Section "Monitor"
    Identifier "DefaultMonitor"
    Option "DPMS" "false"
    Option "PreferredMode" "1280x720"
EndSection

# V0rtexOS — Xorg configuration
# Compatível com VMs (QEMU/VBox/VMware) e bare metal.

Section "ServerFlags"
    Option "AutoAddDevices"     "true"
    Option "AutoEnableDevices"  "true"
    # VMs podem demorar a enumerar input; false faz o Xorg abortar
    Option "AllowEmptyInput"    "true"
EndSection

Section "Device"
    Identifier      "V0rtexCard"
    Driver          "modesetting"
    FallbackDriver  "fbdev"
    Option          "AccelMethod" "glamor"
EndSection

Section "Screen"
    Identifier  "V0rtexScreen"
    Device      "V0rtexCard"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "1920x1080" "1280x720" "1024x768"
    EndSubSection
EndSection

Section "InputClass"
    Identifier "libinput pointer"
    MatchIsPointer "on"
    Driver "libinput"
    Option "AccelProfile" "flat"
EndSection

Section "InputClass"
    Identifier "libinput keyboard"
    MatchIsKeyboard "on"
    Driver "libinput"
EndSection

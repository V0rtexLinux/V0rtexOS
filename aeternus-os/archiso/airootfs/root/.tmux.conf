# AETERNUS OS — tmux configuration
# Otimizado para múltiplas colunas de operação

# ── Prefixo ────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── Mouse e Clipboard ─────────────────────────
set -g mouse on
set-option -s set-clipboard on
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"

# ── Cores ─────────────────────────────────────
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── Status bar ────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#0d0d0d,fg=#00ff41"
set -g status-left "#[fg=#00ff41,bold] AETERNUS #[fg=#1a1a1a]│ "
set -g status-left-length 20
set -g status-right "#[fg=#4d4d4d]│ #[fg=#00ff41]%H:%M #[fg=#4d4d4d]│ #[fg=#00ff41]#H "
set -g status-right-length 50

# Window status
setw -g window-status-format         "#[fg=#333333] #I:#W "
setw -g window-status-current-format "#[fg=#00ff41,bold,bg=#1a1a1a] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style        "fg=#1a1a1a"
set -g pane-active-border-style "fg=#00ff41"

# ── Comportamento ─────────────────────────────
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g repeat-time 600
set -g focus-events on
set -sg escape-time 0

# ── Keybindings ───────────────────────────────
# Splits (manter diretório atual)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"' '"'
unbind %

# Navegar com vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionar
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Nova janela no diretório atual
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config recarregada!"

# Layout de 3 colunas (para recon)
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout tiled

# Layout rápido: 3 painéis lado a lado
bind @ \
    split-window -h -c "#{pane_current_path}" \; \
    split-window -h -c "#{pane_current_path}" \; \
    select-layout even-horizontal

# Layout rápido: 2x2 grid
bind # \
    split-window -h -c "#{pane_current_path}" \; \
    split-window -v -c "#{pane_current_path}" \; \
    select-pane -L \; \
    split-window -v -c "#{pane_current_path}" \; \
    select-layout tiled

# Vi mode para scroll
setw -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ── Sessões rápidas ───────────────────────────
bind S new-session
bind X kill-session

# Sincronizar input em todos os painéis (broadcast)
bind e setw synchronize-panes on  \; display "Sync ON  — digitando em TODOS os painéis"
bind E setw synchronize-panes off \; display "Sync OFF"


name: Build AETERNUS OS ISO

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    container:
      image: archlinux:latest
      options: --privileged --cap-add=ALL

    env:
      TERM: xterm
      # Desabilitar interatividade em todos os subprocessos
      DEBIAN_FRONTEND: noninteractive

    steps:
      # ─────────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. ENTROPIA — haveged (obrigatório para
      #    pacman-key --init funcionar em containers)
      # ─────────────────────────────────────────────
      - name: Start entropy daemon (haveged)
        run: |
          pacman -Sy --noconfirm --needed archlinux-keyring haveged
          haveged -w 1024 &
          # Aguardar haveged encher o pool de entropia
          sleep 5
          echo "[*] Entropy pool: $(cat /proc/sys/kernel/random/entropy_avail) bits"

      # ─────────────────────────────────────────────
      # 3. ATUALIZAR SISTEMA + INICIALIZAR KEYRING
      # ─────────────────────────────────────────────
      - name: Update system and initialize pacman keyring
        run: |
          # Atualizar keyring antes de qualquer outra coisa
          pacman -Su --noconfirm
          # Inicializar keyring do Arch (requer entropia — haveged já rodando)
          pacman-key --init
          pacman-key --populate archlinux
          echo "[+] Arch keyring inicializado"

      # ─────────────────────────────────────────────
      # 4. INSTALAR DEPENDÊNCIAS DE BUILD
      # ─────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          pacman -S --noconfirm --needed \
            archiso \
            git \
            curl \
            wget \
            python3 \
            unzip \
            openssl \
            dosfstools \
            mtools \
            libisoburn \
            squashfs-tools \
            erofs-utils \
            e2fsprogs \
            libarchive \
            xorriso \
            grub \
            efibootmgr

      # ─────────────────────────────────────────────
      # 5. ADICIONAR REPOSITÓRIO BLACKARCH NO HOST
      #    (necessário para mkarchiso baixar pacotes
      #     do BlackArch durante o build da ISO)
      # ─────────────────────────────────────────────
      - name: Add BlackArch repository to host
        run: |
          echo "[*] Baixando BlackArch strap..."
          curl -fsSL https://blackarch.org/strap.sh -o /tmp/blackarch-strap.sh
          chmod +x /tmp/blackarch-strap.sh

          # Verificar SHA1 do strap (segurança)
          expected_sha1="5ea40d49ecd14c2e024deecf90605426db97ea0c"
          actual_sha1=$(sha1sum /tmp/blackarch-strap.sh | awk '{print $1}')
          if [[ "$actual_sha1" != "$expected_sha1" ]]; then
            echo "[!] SHA1 do strap.sh não confere: $actual_sha1"
            echo "[!] Continuando mesmo assim (SHA1 pode ter mudado)..."
          else
            echo "[+] SHA1 verificado: $actual_sha1"
          fi

          bash /tmp/blackarch-strap.sh
          rm -f /tmp/blackarch-strap.sh

          # Sincronizar base de dados de pacotes com BlackArch
          pacman -Sy --noconfirm
          echo "[+] BlackArch repositório adicionado ao host"

      # ─────────────────────────────────────────────
      # 6. VERIFICAR ESTRUTURA DOS ARQUIVOS DE BUILD
      # ─────────────────────────────────────────────
      - name: Verify build source files
        working-directory: ./aeternus-os
        run: |
          echo "=== Estrutura de arquivos ==="
          find . -type f | sort

          echo ""
          echo "=== Verificando arquivos obrigatórios ==="
          required_files=(
            "build.sh"
            "amnesia.sh"
            "archiso/profiledef.sh"
            "archiso/pacman.conf"
            "archiso/packages.x86_64"
            "ghost-protocol/ghost-protocol.sh"
            "ghost-protocol/ghost-protocol.service"
            "justice/aet-scan.py"
            "justice/aet-nuke.py"
            "kernel/hardened.conf"
            "kernel/hardened-sysctl.conf"
            "kernel/mkinitcpio-hardened.conf"
            "tools/install-tools.sh"
            "tools/payload-gen.sh"
            "tools/network-attacks.sh"
            "tools/ad-attack.sh"
            "tools/wireless-attack.sh"
            "tools/post-exploit.sh"
            "tools/privesc-linux.sh"
            "tools/web-enum.sh"
            "tools/shell-gen.sh"
            "tools/tunnel-setup.sh"
          )

          missing=0
          for f in "${required_files[@]}"; do
            if [[ -f "$f" ]]; then
              echo "  [+] $f"
            else
              echo "  [!] FALTANDO: $f"
              missing=$((missing + 1))
            fi
          done

          [[ $missing -gt 0 ]] && echo "[!] $missing arquivo(s) faltando" || echo "[+] Todos os arquivos presentes"

      # ─────────────────────────────────────────────
      # 7. BUILD DA ISO
      #    (NÃO roda install-tools.sh — essa tool é
      #     pós-boot no sistema live, não no build)
      # ─────────────────────────────────────────────
      - name: Build AETERNUS OS ISO
        working-directory: ./aeternus-os
        run: |
          chmod +x build.sh
          # CI=true desativa 'clear' e relaxa checagem de disco
          CI=true bash build.sh 2>&1

      # ─────────────────────────────────────────────
      # 8. CHECKSUMS
      # ─────────────────────────────────────────────
      - name: Generate checksums
        working-directory: ./aeternus-os
        if: success()
        run: |
          mkdir -p release
          cd release
          if ls *.iso 1>/dev/null 2>&1; then
            sha256sum *.iso > checksum.sha256
            md5sum    *.iso > checksum.md5
            echo "[+] ISO gerada:"
            ls -lh *.iso
            echo ""
            echo "[+] SHA256:"
            cat checksum.sha256
          else
            echo "[!] Nenhuma ISO encontrada"
            ls -la .
            exit 1
          fi

      # ─────────────────────────────────────────────
      # 9. LOG DE BUILD (sempre, mesmo em falha)
      # ─────────────────────────────────────────────
      - name: Show build log on failure
        if: failure()
        run: |
          echo "=== /tmp/aeternus-build.log ==="
          cat /tmp/aeternus-build.log 2>/dev/null || echo "(log não encontrado)"
          echo ""
          echo "=== Últimas 100 linhas do journal ==="
          journalctl -n 100 --no-pager 2>/dev/null || true

      # ─────────────────────────────────────────────
      # 10. UPLOAD DO ARTIFACT
      # ─────────────────────────────────────────────
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AETERNUS-OS-${{ github.run_number }}-${{ github.sha }}
          path: |
            aeternus-os/release/*.iso
            aeternus-os/release/checksum.sha256
            aeternus-os/release/checksum.md5
          retention-days: 7
          if-no-files-found: warn

      # ─────────────────────────────────────────────
      # 11. SUMÁRIO DO JOB
      # ─────────────────────────────────────────────
      - name: Job summary
        if: always()
        working-directory: ./aeternus-os
        run: |
          ISO=$(find release/ -name "*.iso" 2>/dev/null | head -1)
          if [[ -n "$ISO" ]]; then
            SIZE=$(du -sh "$ISO" | cut -f1)
            SHA=$(sha256sum "$ISO" | awk '{print $1}')
            echo "## AETERNUS OS Build Concluído" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| ISO | \`$(basename "$ISO")\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Tamanho | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| SHA256 | \`$SHA\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "# Gravar em USB:" >> $GITHUB_STEP_SUMMARY
            echo "sudo dd if=$(basename "$ISO") of=/dev/sdX bs=4M status=progress && sync" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Build FALHOU" >> $GITHUB_STEP_SUMMARY
            echo "Nenhuma ISO foi gerada. Verifique os logs acima." >> $GITHUB_STEP_SUMMARY
          fi

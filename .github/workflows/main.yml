name: Build AETERNUS OS ISO

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TERM: xterm

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free disk space (host Ubuntu)
        run: |
          echo "[*] Disco antes da limpeza:"
          df -h

          # Remover ferramentas pré-instaladas que não precisamos
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            /usr/share/swift \
            /usr/local/.ghcup \
            /usr/lib/jvm \
            /usr/share/java \
            /opt/microsoft \
            /usr/local/graalvm \
            /usr/share/miniconda \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/az_9.3.0 \
            /usr/local/lib/node_modules \
            /usr/lib/firefox \
            /usr/share/mysql \
            /usr/share/php* \
            /opt/pipx \
            /usr/local/bin/phpunit \
            || true

          sudo apt-get clean -y
          sudo apt-get autoremove -y

          # Limpar imagens Docker pré-carregadas
          docker system prune -af --volumes || true

          echo "[+] Disco após limpeza:"
          df -h

      - name: Pull Arch Linux image
        run: docker pull archlinux:latest

      - name: Build AETERNUS OS ISO (Arch container)
        run: |
          docker run \
            --privileged \
            --cap-add=ALL \
            --rm \
            -v "${{ github.workspace }}:/build" \
            -e CI=true \
            -e TERM=xterm \
            archlinux:latest \
            bash -c "
              set -euo pipefail
              echo '[*] Espaço disponível no início:'
              df -h

              # Instalar dependências base
              pacman -Sy --noconfirm --needed archlinux-keyring haveged
              haveged -w 1024 &
              sleep 3

              pacman -Su --noconfirm
              pacman-key --init
              pacman-key --populate archlinux

              pacman -S --noconfirm --needed \
                archiso git curl wget python3 unzip openssl \
                dosfstools mtools libisoburn squashfs-tools \
                erofs-utils e2fsprogs libarchive xorriso grub efibootmgr

              # Adicionar BlackArch
              curl -fsSL https://blackarch.org/strap.sh -o /tmp/blackarch-strap.sh
              chmod +x /tmp/blackarch-strap.sh
              bash /tmp/blackarch-strap.sh
              rm -f /tmp/blackarch-strap.sh
              pacman -Sy --noconfirm

              echo '[*] Espaço antes do build:'
              df -h

              cd /build/aeternus-os
              chmod +x build.sh
              CI=true bash build.sh 2>&1

              echo '[*] Espaço após build:'
              df -h
            "

      - name: Generate checksums
        if: success()
        run: |
          cd aeternus-os/release
          sha256sum *.iso > checksum.sha256
          md5sum    *.iso > checksum.md5
          ls -lh *.iso && cat checksum.sha256

      - name: Show build log on failure
        if: failure()
        run: |
          cat /tmp/aeternus-build.log 2>/dev/null || \
          docker run --rm -v "${{ github.workspace }}:/build" archlinux:latest \
            cat /tmp/aeternus-build.log 2>/dev/null || echo "(log não encontrado)"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AETERNUS-OS-${{ github.run_number }}-${{ github.sha }}
          path: |
            aeternus-os/release/*.iso
            aeternus-os/release/checksum.sha256
            aeternus-os/release/checksum.md5
          retention-days: 7
          if-no-files-found: warn

      - name: Job summary
        if: always()
        run: |
          ISO=$(find aeternus-os/release/ -name "*.iso" 2>/dev/null | head -1)
          if [[ -n "$ISO" ]]; then
            SIZE=$(du -sh "$ISO" | cut -f1)
            SHA=$(sha256sum "$ISO" | awk '{print $1}')
            echo "## AETERNUS OS Build Concluído" >> $GITHUB_STEP_SUMMARY
            echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| ISO | \`$(basename "$ISO")\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Tamanho | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| SHA256 | \`$SHA\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Build FALHOU — nenhuma ISO gerada" >> $GITHUB_STEP_SUMMARY
          fi
